name: CI

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "*.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - ".github/workflows/**"
      - "detekt.yml"
      - ".editorconfig"
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - "*.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - ".github/workflows/**"
      - "detekt.yml"
      - ".editorconfig"
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4

      - name: Run ktlint and detekt
        run: ./gradlew --no-daemon ktlintCheck detekt

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew --no-daemon assembleDebug

      # Validates Xposed module packaging in the built APK.
      # Supports both legacy Xposed (assets/xposed_init) and modern libxposed
      # (META-INF/xposed/*). Hard-fails if neither entry point is present.
      # Note: runtime hook behaviour on Android 16 requires manual device verification with LSPosed.
      - name: Validate module packaging
        run: |
          APK=$(ls app/build/outputs/apk/debug/*.apk | head -1)
          echo "Validating module packaging: $APK"
          if unzip -p "$APK" META-INF/xposed/module.prop > /dev/null 2>&1; then
            echo "Detected: libxposed module (META-INF/xposed present)"
            for F in META-INF/xposed/java_init.list META-INF/xposed/scope.list META-INF/xposed/module.prop; do
              unzip -p "$APK" "$F" > /dev/null 2>&1 \
                || { echo "::error::Missing from APK: $F"; exit 1; }
              echo "  OK: $F"
            done
            unzip -p "$APK" META-INF/xposed/java_init.list \
              | grep -qF "io.drsr.hotspotadb.HotspotAdbModule" \
              || { echo "::error::java_init.list: expected io.drsr.hotspotadb.HotspotAdbModule"; exit 1; }
            echo "  OK: java_init.list -> io.drsr.hotspotadb.HotspotAdbModule"
            for SCOPE in com.android.settings android; do
              unzip -p "$APK" META-INF/xposed/scope.list | grep -qF "$SCOPE" \
                || { echo "::error::scope.list: missing scope $SCOPE"; exit 1; }
              echo "  OK: scope.list contains $SCOPE"
            done
            for PROP in "minApiVersion=101" "targetApiVersion=101" "staticScope=true"; do
              unzip -p "$APK" META-INF/xposed/module.prop | grep -qF "$PROP" \
                || { echo "::error::module.prop: missing $PROP"; exit 1; }
              echo "  OK: module.prop has $PROP"
            done
          elif unzip -p "$APK" assets/xposed_init > /dev/null 2>&1; then
            echo "Detected: legacy Xposed module (assets/xposed_init present)"
            unzip -p "$APK" assets/xposed_init \
              | grep -qF "io.drsr.hotspotadb.HotspotAdbModule" \
              || { echo "::error::xposed_init: expected io.drsr.hotspotadb.HotspotAdbModule"; exit 1; }
            echo "  OK: xposed_init -> io.drsr.hotspotadb.HotspotAdbModule"
          else
            echo "::error::APK contains neither META-INF/xposed/module.prop nor assets/xposed_init. Module packaging is broken."
            exit 1
          fi
          echo "Module packaging validation passed."

      - uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
