name: Release APK

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag / GitHub Release tag to create. Leave blank to use versionName from app/build.gradle.kts."
        required: false
        default: ""
      name:
        description: "GitHub Release title. Leave blank to use the resolved tag."
        required: false
        default: ""
      draft:
        description: "Create as draft release"
        required: false
        type: boolean
        default: false
      prerelease:
        description: "Mark as prerelease"
        required: false
        type: boolean
        default: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish signed APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          VERSION_NAME="$(sed -n 's/^[[:space:]]*versionName[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p' app/build.gradle.kts | head -n 1)"
          VERSION_CODE="$(sed -n 's/^[[:space:]]*versionCode[[:space:]]*=[[:space:]]*\([0-9][0-9]*\).*/\1/p' app/build.gradle.kts | head -n 1)"

          [ -n "$VERSION_NAME" ] || { echo "::error::Could not parse versionName from app/build.gradle.kts"; exit 1; }
          [ -n "$VERSION_CODE" ] || { echo "::error::Could not parse versionCode from app/build.gradle.kts"; exit 1; }

          INPUT_TAG='${{ inputs.tag }}'
          INPUT_NAME='${{ inputs.name }}'

          if [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="$VERSION_NAME"
          fi

          if [ -n "$INPUT_NAME" ]; then
            RELEASE_NAME="$INPUT_NAME"
          else
            RELEASE_NAME="$TAG"
          fi

          APK_BASENAME="hotspotadb-${TAG}.apk"
          SHA256_NAME="${APK_BASENAME}.sha256"

          {
            echo "version_name=$VERSION_NAME"
            echo "version_code=$VERSION_CODE"
            echo "tag=$TAG"
            echo "release_name=$RELEASE_NAME"
            echo "apk_basename=$APK_BASENAME"
            echo "sha256_name=$SHA256_NAME"
          } >> "$GITHUB_OUTPUT"

          echo "Resolved versionName: $VERSION_NAME"
          echo "Resolved versionCode: $VERSION_CODE"
          echo "Release tag: $TAG"
          echo "Release title: $RELEASE_NAME"

      - name: Validate signing secrets
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail

          MISSING=()
          [ -n "$KEYSTORE_BASE64" ] || MISSING+=(KEYSTORE_BASE64)
          [ -n "$KEYSTORE_PASSWORD" ] || MISSING+=(KEYSTORE_PASSWORD)
          [ -n "$KEY_ALIAS" ] || MISSING+=(KEY_ALIAS)
          [ -n "$KEY_PASSWORD" ] || MISSING+=(KEY_PASSWORD)

          if [ "${#MISSING[@]}" -gt 0 ]; then
            printf '::error::Missing required repository secrets: %s\n' "${MISSING[*]}"
            echo "::error::Set them in Settings -> Secrets and variables -> Actions."
            exit 1
          fi

          if ! printf '%s' "$KEYSTORE_BASE64" | tr -d '[:space:]' | base64 --decode > /dev/null 2>&1; then
            echo "::error::KEYSTORE_BASE64 is not valid base64. Regenerate with: base64 -w 0 release.keystore"
            exit 1
          fi

          echo "Signing secrets are present and KEYSTORE_BASE64 is decodable."

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Decode and validate keystore
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          set -euo pipefail
          umask 077

          printf '%s' "$KEYSTORE_BASE64" | tr -d '[:space:]' | base64 --decode > /tmp/release.keystore
          chmod 600 /tmp/release.keystore

          keytool -list \
            -keystore /tmp/release.keystore \
            -storepass "$KEYSTORE_PASSWORD" \
            -alias "$KEY_ALIAS" \
            -noprompt > /dev/null

          echo "Decoded and validated /tmp/release.keystore"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build signed release APK
        shell: bash
        env:
          KEYSTORE_PATH: /tmp/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          ./gradlew --no-daemon clean assembleRelease

      - name: Inspect and validate built APK
        id: apk
        shell: bash
        run: |
          set -euo pipefail

          APK_PATH="$(find app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' | sort | head -n 1)"
          [ -n "$APK_PATH" ] || { echo "::error::No release APK found under app/build/outputs/apk/release"; exit 1; }

          echo "Built APK: $APK_PATH"

          if unzip -p "$APK_PATH" META-INF/xposed/module.prop > /dev/null 2>&1; then
            echo "Detected modern libxposed packaging"
            for f in META-INF/xposed/java_init.list META-INF/xposed/scope.list META-INF/xposed/module.prop; do
              unzip -p "$APK_PATH" "$f" > /dev/null 2>&1 || {
                echo "::error::Missing packaged module file: $f"
                exit 1
              }
            done
            unzip -p "$APK_PATH" META-INF/xposed/java_init.list | grep -qx 'io.drsr.hotspotadb.HotspotAdbModule' || {
              echo "::error::java_init.list does not contain io.drsr.hotspotadb.HotspotAdbModule"
              exit 1
            }
            for scope in com.android.settings android; do
              unzip -p "$APK_PATH" META-INF/xposed/scope.list | grep -qx "$scope" || {
                echo "::error::scope.list missing scope: $scope"
                exit 1
              }
            done
            for prop in 'minApiVersion=101' 'targetApiVersion=101' 'staticScope=true'; do
              unzip -p "$APK_PATH" META-INF/xposed/module.prop | grep -qx "$prop" || {
                echo "::error::module.prop missing: $prop"
                exit 1
              }
            done
          elif unzip -p "$APK_PATH" assets/xposed_init > /dev/null 2>&1; then
            echo "Detected legacy Xposed packaging"
            unzip -p "$APK_PATH" assets/xposed_init | grep -qx 'io.drsr.hotspotadb.HotspotAdbModule' || {
              echo "::error::assets/xposed_init does not contain io.drsr.hotspotadb.HotspotAdbModule"
              exit 1
            }
          else
            echo "::error::APK contains neither modern libxposed metadata nor legacy xposed_init"
            exit 1
          fi

          cp "$APK_PATH" "${{ steps.meta.outputs.apk_basename }}"
          sha256sum "${{ steps.meta.outputs.apk_basename }}" > "${{ steps.meta.outputs.sha256_name }}"

          {
            echo "apk_path=$APK_PATH"
            echo "release_apk=${{ steps.meta.outputs.apk_basename }}"
            echo "release_sha256=${{ steps.meta.outputs.sha256_name }}"
          } >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          set -euo pipefail

          VERSION_NAME='${{ steps.meta.outputs.version_name }}'
          NOTES_FILE=/tmp/release-notes.md

          awk -v v="$VERSION_NAME" '
            index($0, "## [" v "]") == 1 { found=1; print; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > "$NOTES_FILE"

          if ! grep -q '[^[:space:]]' "$NOTES_FILE"; then
            cat > "$NOTES_FILE" <<EOF
          Release ${{ steps.meta.outputs.release_name }}

          Built from commit ${{ github.sha }}.
          EOF
          fi

          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Upload release artifacts to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ steps.meta.outputs.tag }}
          path: |
            ${{ steps.apk.outputs.release_apk }}
            ${{ steps.apk.outputs.release_sha256 }}
          if-no-files-found: error

      - name: Create or update git tag
        shell: bash
        run: |
          set -euo pipefail
          TAG='${{ steps.meta.outputs.tag }}'

          if git rev-parse -q --verify "refs/tags/$TAG" > /dev/null; then
            echo "Tag $TAG already exists; leaving it unchanged."
          else
            git tag "$TAG" "$GITHUB_SHA"
            git push origin "refs/tags/$TAG"
            echo "Created and pushed tag $TAG"
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.release_name }}
          body_path: ${{ steps.notes.outputs.notes_file }}
          files: |
            ${{ steps.apk.outputs.release_apk }}
            ${{ steps.apk.outputs.release_sha256 }}
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          fail_on_unmatched_files: true
