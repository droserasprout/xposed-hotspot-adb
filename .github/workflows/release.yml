name: Release

# Trigger: manual run from the GitHub web UI.
# Use the branch selector to choose the source ref (default: main).
# Leave "version" blank to auto-bump the patch component.
#
# Required secrets (repository-level — Settings > Secrets and variables > Actions):
#   KEYSTORE_BASE64    base64-encoded release keystore (encode with: base64 -w 0 release.keystore)
#   KEYSTORE_PASSWORD  keystore store password
#   KEY_ALIAS          signing key alias
#   KEY_PASSWORD       signing key password
# Optional secret:
#   XPOSED_REPO_TOKEN  publish to Xposed-Modules-Repo; skipped when absent
#
# Step order rationale:
#   1. Secrets are decoded and validated with keytool BEFORE the expensive
#      Android SDK / Gradle toolchain setup, so bad credentials fail fast.
#   2. The APK is built and validated BEFORE any git commit or tag is created,
#      so a failed build or signing step never leaves an orphaned release commit
#      or tag that would block reruns.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.2.3). Leave blank to auto-bump patch."
        required: false
        default: ""

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 1. Resolve the release version ────────────────────────────────────
      - name: Resolve version
        id: version
        run: |
          CURRENT_VERSION=$(grep 'versionName = ' app/build.gradle.kts \
            | sed 's/.*versionName = "\(.*\)".*/\1/')
          CURRENT_CODE=$(grep 'versionCode = ' app/build.gradle.kts \
            | sed 's/.*versionCode = \([0-9]*\).*/\1/')

          if [ -z "$CURRENT_VERSION" ] || [ -z "$CURRENT_CODE" ]; then
            echo "::error::Could not parse versionName or versionCode from app/build.gradle.kts"
            exit 1
          fi

          INPUT_VERSION="${{ inputs.version }}"

          if [ -z "$INPUT_VERSION" ]; then
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
            PATCH=$((PATCH + 1))
            VERSION="$MAJOR.$MINOR.$PATCH"
          else
            if ! echo "$INPUT_VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "::error::Invalid version '$INPUT_VERSION'. Expected MAJOR.MINOR.PATCH (e.g. 1.2.3)"
              exit 1
            fi
            VERSION="$INPUT_VERSION"
          fi

          NEW_CODE=$((CURRENT_CODE + 1))

          echo "version=$VERSION"           >> "$GITHUB_OUTPUT"
          echo "version_code=$NEW_CODE"     >> "$GITHUB_OUTPUT"
          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "current_code=$CURRENT_CODE" >> "$GITHUB_OUTPUT"
          echo "Resolved: $CURRENT_VERSION -> $VERSION  (versionCode: $CURRENT_CODE -> $NEW_CODE)"

      # ── 2. Guard against duplicate releases ───────────────────────────────
      # Non-fatal: if the tag already exists (e.g. a rerun after the commit/tag
      # step succeeded but the GitHub Release step failed), the build still runs
      # and the release is (re)published.  The git commit/tag step is skipped.
      - name: Check for existing tag
        id: tag_check
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if git tag --list "$VERSION" | grep -q .; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Tag $VERSION already exists — the commit/tag step will be skipped. Build and release publication will still run to complete a previously interrupted release."
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag $VERSION does not yet exist — proceeding normally."
          fi

      # ── 3. Fail early for missing or invalid signing secrets ───────────────
      # These are repository-level secrets (no environment: key on this job).
      # Configure them under: Settings > Secrets and variables > Actions.
      - name: Validate signing secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "Secret scope: repository-level secrets (no environment: attached to this job)"
          MISSING=""
          [ -z "$KEYSTORE_BASE64"   ] && MISSING="$MISSING KEYSTORE_BASE64"
          [ -z "$KEYSTORE_PASSWORD" ] && MISSING="$MISSING KEYSTORE_PASSWORD"
          [ -z "$KEY_ALIAS"          ] && MISSING="$MISSING KEY_ALIAS"
          [ -z "$KEY_PASSWORD"       ] && MISSING="$MISSING KEY_PASSWORD"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required repository secrets:$MISSING"
            echo "::error::Configure them under: Settings > Secrets and variables > Actions"
            exit 1
          fi
          # Validate KEYSTORE_BASE64 is decodable (strip whitespace first to handle
          # line-wrapped or Windows-encoded secrets).
          if ! printf '%s' "$KEYSTORE_BASE64" \
               | tr -d '[:space:]' | base64 -d > /dev/null 2>&1; then
            echo "::error::KEYSTORE_BASE64 is not valid base64. Re-encode with: base64 -w 0 release.keystore"
            exit 1
          fi

      # ── 4. Decode keystore and validate credentials ───────────────────────
      # Java is set up first so that keytool comes from the known Temurin
      # distribution rather than whatever is preinstalled on the runner image.
      # Android SDK / Gradle setup is deferred until step 5 to keep the
      # expensive SDK download after the fast credential validation.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          umask 077
          printf '%s' "$KEYSTORE_BASE64" | tr -d '[:space:]' | base64 -d > /tmp/release.keystore
          chmod 600 /tmp/release.keystore
          echo "Keystore decoded to /tmp/release.keystore ($(wc -c < /tmp/release.keystore) bytes)"

      - name: Validate keystore credentials
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          keytool -list \
            -keystore /tmp/release.keystore \
            -storepass "$KEYSTORE_PASSWORD" \
            -alias "$KEY_ALIAS" \
            -noprompt
          echo "Keystore credentials validated: alias is present and accessible."

      # ── 5. Set up remaining build toolchain ───────────────────────────────
      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4

      # ── 6. Update version metadata (local — not committed yet) ────────────
      # Files updated: app/build.gradle.kts, CHANGELOG.md
      - name: Update version metadata
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NEW_CODE="${{ steps.version.outputs.version_code }}"
          CURRENT_VERSION="${{ steps.version.outputs.current_version }}"
          CURRENT_CODE="${{ steps.version.outputs.current_code }}"

          sed -i "s/versionCode = $CURRENT_CODE/versionCode = $NEW_CODE/" app/build.gradle.kts
          sed -i "s/versionName = \"$CURRENT_VERSION\"/versionName = \"$VERSION\"/" app/build.gradle.kts

          if ! grep -qF "## [$VERSION]" CHANGELOG.md; then
            TODAY=$(date -u +%Y-%m-%d)
            FIRST_LINE=$(grep -n '^## \[' CHANGELOG.md | head -1 | cut -d: -f1)
            if [ -n "$FIRST_LINE" ]; then
              {
                head -n $((FIRST_LINE - 1)) CHANGELOG.md
                echo "## [$VERSION] - $TODAY"
                echo ""
                echo "### Changed"
                echo ""
                echo "- Release $VERSION."
                echo ""
                tail -n +"$FIRST_LINE" CHANGELOG.md
              } > /tmp/changelog.tmp && mv /tmp/changelog.tmp CHANGELOG.md
            else
              printf '\n## [%s] - %s\n\n### Changed\n\n- Release %s.\n' \
                "$VERSION" "$TODAY" "$VERSION" >> CHANGELOG.md
            fi
          fi

      # ── 7. Extract release notes from CHANGELOG.md ────────────────────────
      - name: Extract release notes
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CHANGES=$(awk -v v="$VERSION" '
            index($0, "## [" v "]") == 1 { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md | sed '/[^[:space:]]/,$!d' | sed 's/[[:space:]]*$//')
          if [ -z "$(printf '%s' "$CHANGES" | tr -d '[:space:]')" ]; then
            CHANGES="Release $VERSION."
            echo "Release notes: no changelog section found for $VERSION — using fallback text"
          else
            echo "Release notes: extracted from CHANGELOG.md section for $VERSION"
          fi
          {
            echo "changes<<RELEASE_NOTES_EOF"
            printf '%s\n' "$CHANGES"
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      # ── 8. Build signed release APK ───────────────────────────────────────
      - name: Build release APK
        run: ./gradlew --no-daemon assembleRelease
        env:
          KEYSTORE_PATH: /tmp/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # ── 9. Validate release APK module packaging ──────────────────────────
      - name: Validate module packaging
        run: |
          APK=$(ls app/build/outputs/apk/release/*.apk 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            echo "::error::No APK found at app/build/outputs/apk/release/ — build may have failed silently."
            exit 1
          fi
          echo "Validating module packaging: $APK"
          if unzip -p "$APK" META-INF/xposed/module.prop > /dev/null 2>&1; then
            echo "Detected: libxposed module (META-INF/xposed present)"
            for F in META-INF/xposed/java_init.list META-INF/xposed/scope.list META-INF/xposed/module.prop; do
              unzip -p "$APK" "$F" > /dev/null 2>&1 \
                || { echo "::error::Missing from APK: $F"; exit 1; }
              echo "  OK: $F"
            done
            unzip -p "$APK" META-INF/xposed/java_init.list \
              | grep -qF "io.drsr.hotspotadb.HotspotAdbModule" \
              || { echo "::error::java_init.list: expected io.drsr.hotspotadb.HotspotAdbModule"; exit 1; }
            echo "  OK: java_init.list -> io.drsr.hotspotadb.HotspotAdbModule"
            for SCOPE in com.android.settings android; do
              unzip -p "$APK" META-INF/xposed/scope.list | grep -qF "$SCOPE" \
                || { echo "::error::scope.list: missing scope $SCOPE"; exit 1; }
              echo "  OK: scope.list contains $SCOPE"
            done
            for PROP in "minApiVersion=101" "targetApiVersion=101" "staticScope=true"; do
              unzip -p "$APK" META-INF/xposed/module.prop | grep -qF "$PROP" \
                || { echo "::error::module.prop: missing $PROP"; exit 1; }
              echo "  OK: module.prop has $PROP"
            done
          elif unzip -p "$APK" assets/xposed_init > /dev/null 2>&1; then
            echo "Detected: legacy Xposed module (assets/xposed_init present)"
            unzip -p "$APK" assets/xposed_init \
              | grep -qF "io.drsr.hotspotadb.HotspotAdbModule" \
              || { echo "::error::xposed_init: expected io.drsr.hotspotadb.HotspotAdbModule"; exit 1; }
            echo "  OK: xposed_init -> io.drsr.hotspotadb.HotspotAdbModule"
          else
            echo "::error::APK contains neither META-INF/xposed/module.prop nor assets/xposed_init. Module packaging is broken."
            exit 1
          fi
          echo "Module packaging validation passed."

      # ── 10. Commit metadata changes and create tag ────────────────────────
      # Only reached after a successful build and validation — no orphaned
      # commits or tags if the build or signing fails.
      # Skipped on rerun if the tag was already created in a previous attempt
      # (the build will still run and the release step will republish the APK).
      - name: Commit and tag
        if: steps.tag_check.outputs.tag_exists != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts CHANGELOG.md
          git commit -m "Release ${{ steps.version.outputs.version }}"
          git tag "${{ steps.version.outputs.version }}"
          git push origin HEAD:"${{ github.ref_name }}" "${{ steps.version.outputs.version }}"

      # ── 11. Publish GitHub Release in this repository ─────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          body: ${{ steps.notes.outputs.changes }}
          files: app/build/outputs/apk/release/*.apk
          fail_on_unmatched_files: true

      # ── 12. Publish to Xposed-Modules-Repo (optional) ────────────────────
      # Skipped when XPOSED_REPO_TOKEN is not configured.
      #- name: Log Xposed-Modules-Repo publish status
      #  if: ${{ secrets.XPOSED_REPO_TOKEN == '' }}
      #  run: echo "Skipping Xposed-Modules-Repo publish -- XPOSED_REPO_TOKEN is not configured."

      #- name: Publish to Xposed-Modules-Repo
      #  if: ${{ secrets.XPOSED_REPO_TOKEN != '' }}
      #  uses: softprops/action-gh-release@v2
      #  with:
      #    repository: Xposed-Modules-Repo/io.drsr.hotspotadb
      #    token: ${{ secrets.XPOSED_REPO_TOKEN }}
      #    tag_name: ${{ steps.version.outputs.version }}
      #    name: ${{ steps.version.outputs.version }}
